<h2>绘本预览与输出</h2>
<p class="subtitle">生成后的10页绘本如何展示和导出</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>翻页预览 + 打印</h3>
      <p>类似真实绘本的左右翻页效果，可逐页查看，支持打印成册</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>瀑布流展示 + 下载</h3>
      <p>所有页面以网格/瀑布流形式平铺展示，支持下载PDF或单张图片</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>幻灯片模式</h3>
      <p>自动播放的幻灯片效果，可手动切换，适合演示和大屏查看</p>
    </div>
  </div>
</div>

<br>

<div class="mockup">
  <div class="mockup-header">Mockup A: 翻页预览</div>
  <div class="mockup-body">
    <div style="display: flex; gap: 20px; align-items: center;">
      <button style="font-size: 24px; padding: 10px 15px;">◀</button>
      <div style="flex: 1; background: #fef9e7; border-radius: 8px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);">
        <div style="text-align: center; font-size: 14px; color: #666; margin-bottom: 15px;">第 3 / 10 页</div>
        <div style="background: #fff; border-radius: 8px; height: 300px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
          <div style="text-align: center;">
            <div style="font-size: 120px;">🐻</div>
            <div style="font-size: 12px; color: #888; margin-top: 10px;">[绘本图片]</div>
          </div>
        </div>
        <div style="text-align: center; font-size: 18px; line-height: 1.8;">小熊噜噜走进森林，遇到了一只聪明的猫头鹰爷爷...</div>
      </div>
      <button style="font-size: 24px; padding: 10px 15px;">▶</button>
    </div>
    <div style="display: flex; justify-content: center; gap: 10px; margin-top: 15px;">
      <button style="padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 8px;">🖨️ 打印</button>
      <button style="padding: 10px 20px; background: #764ba2; color: white; border: none; border-radius: 8px;">📥 下载PDF</button>
      <button style="padding: 10px 20px; background: #f5576c; color: white; border: none; border-radius: 8px;">✏️ 重新生成</button>
    </div>
  </div>
</div>
