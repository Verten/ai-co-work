<h2>用户系统确认</h2>
<p class="subtitle">是否需要用户登录和账户系统</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>无需登录</h3>
      <p>用户直接使用，绘本生成后可在浏览器本地保存/打印，无需账户</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>需要登录</h3>
      <p>用户注册/登录后，可以保存历史绘本、管理自己的作品集</p>
    </div>
  </div>
</div>

<br>

<div class="pros-cons">
  <div class="pros">
    <h4>选择 A（无需登录）</h4>
    <ul>
      <li>用户体验简单直接</li>
      <li>开发工作量更小</li>
      <li>隐私顾虑最少</li>
      <li>适合尝鲜型应用</li>
    </ul>
  </div>
  <div class="cons">
    <h4>选择 B（需要登录）</h4>
    <ul>
      <li>用户可以保存和回顾历史作品</li>
      <li>支持多设备同步</li>
      <li>可基于用户做个性化推荐</li>
      <li>增加开发和维护成本</li>
    </ul>
  </div>
</div>
