<h2>选择首页布局风格</h2>
<p class="subtitle">用户进来后选择生成方式的入口页面</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>卡片式选择</h3>
      <p>两个大卡片并排，点击进入对应模式。视觉明确，操作直观。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>对话式入口</h3>
      <p>类似聊天机器人开场，有一个输入框和引导文字，适合对话式引导。</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>向导步骤式</h3>
      <p>分步骤引导用户：选择模式 → 配置参数 → 生成内容。适合随机生成。</p>
    </div>
  </div>
</div>
